<!DOCTYPE html>
<html>
<head>
  <title>Date Time Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div>FU Logo Placeholder</div>
  <h1>Date Time Checker</h1>
  <form>
    <label for="dayInput">Day:</label>
    <input type="text" id="dayInput"><br><br>
    <label for="monthInput">Month:</label>
    <input type="text" id="monthInput"><br><br>
    <label for="yearInput">Year:</label>
    <input type="text" id="yearInput"><br><br>
    <button id="checkButton">Check</button>
    <button id="clearButton">Clear</button>
    <button id="closeFormButton">Close Form</button>
  </form>
  <p id="messageArea"></p>
  <script src="script.js"></script>
</body>
</html>
